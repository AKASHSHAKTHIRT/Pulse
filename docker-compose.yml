version: '3.8'

services:
  app:
    build: .
    container_name: pulse-app
    ports:
      - "5000:5000"
    volumes:
      - ./time_tracker.db:/app/time_tracker.db
    environment:
      - SECRET_KEY=timetracker-secret-2024
      - PORT=5000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: pulse-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always