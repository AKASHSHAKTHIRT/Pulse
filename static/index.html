function buildInlineProjectTaskChip(taskName, checked = true) {
  const label = document.createElement('label');
  label.style.cssText = 'display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--accent);background:' + (checked ? 'var(--accent-soft)' : 'var(--surface)') + ';cursor:pointer;font-size:13px;font-weight:600;color:' + (checked ? 'var(--accent)' : 'var(--muted)') + ';transition:all .15s';
  label.innerHTML = '<input type="checkbox" ' + (checked ? 'checked' : '') + ' style="display:none" value="' + escHtml(taskName) + '" />' + escHtml(taskName);
  const input = label.querySelector('input');
  label.onclick = function(e) {
    if (e.target.tagName !== 'INPUT') input.checked = !input.checked;
    label.style.borderColor = input.checked ? 'var(--accent)' : 'var(--border)';
    label.style.background = input.checked ? 'var(--accent-soft)' : 'var(--surface)';
    label.style.color = input.checked ? 'var(--accent)' : 'var(--muted)';
    updateProjectAllowedTasks();
  };
  return label;
}

async function addInlineProjectTask() {
  const input = document.getElementById('edit-project-task-inline-input');
  const container = document.getElementById('edit-project-allowed-tasks-container');
  if (!input || !container) return;

  const taskName = input.value.trim();
  if (!taskName) return;

  const exists = Array.from(container.querySelectorAll('input[type="checkbox"]')).some(cb =>
    (cb.value || '').trim().toLowerCase() === taskName.toLowerCase()
  );
  if (exists) {
    toast('Task already exists', 'error');
    input.focus();
    input.select();
    return;
  }

  const r = await api('POST', '/api/admin/task-categories', { name: taskName });
  if (!r.ok) {
    toast(r.data?.error || 'Failed to add task', 'error');
    return;
  }

  if (!appData) appData = {};
  if (!Array.isArray(appData.task_categories)) appData.task_categories = [];
  if (!appData.task_categories.some(t => (t || '').toLowerCase() === taskName.toLowerCase())) {
    appData.task_categories.push(taskName);
  }

  const chip = buildInlineProjectTaskChip(taskName, true);
  container.appendChild(chip);
  updateProjectAllowedTasks();

  const soiWrap = document.querySelector('[id^="ep-soi-lvl-"]')?.closest('table')?.querySelector('tbody');
  if (soiWrap) {
    const key = taskName.replace(/[^a-z0-9]/gi,'_');
    const row = document.createElement('tr');
    row.innerHTML = '<td style="padding:8px 10px;font-size:13px;font-weight:600">' + escHtml(taskName) + '</td>'
      + '<td style="padding:4px 6px"><select class="form-input" id="ep-soi-lvl-' + key + '" style="padding:6px 8px;font-size:12px">'
      + '<option value="">— None —</option>'
      + '<option value="1" style="color:#2563eb">SOI-1</option>'
      + '<option value="2" style="color:#16a34a">SOI-2</option>'
      + '<option value="3" style="color:#d97706">SOI-3</option>'
      + '<option value="4" style="color:#dc2626">SOI-4</option>'
      + '</select></td>'
      + '<td style="padding:4px 6px"><input type="number" min="0" max="100" step="0.1" class="form-input" id="ep-soi-pct-' + key + '" style="padding:6px 8px;font-size:12px;width:90px" placeholder="%" value="" /></td>';
    soiWrap.appendChild(row);
  }

  hideInlineProjectTaskInput();
  toast('Task added successfully', 'success');
}

document.addEventListener('keydown', function(e) {
  const input = document.getElementById('edit-project-task-inline-input');
  const box = document.getElementById('edit-project-task-inline-box');
  if (!input || !box || box.style.display === 'none') return;
  if (e.key === 'Enter' && document.activeElement === input) {
    e.preventDefault();
    addInlineProjectTask();
  }
  if (e.key === 'Escape') {
    hideInlineProjectTaskInput();
  }
});

  const box = document.getElementById('dash-task-box');
  if (box) box.style.display = 'none';
}

async function dashAddTask() {
  const inp  = document.getElementById('dash-task-input');
  const msg  = document.getElementById('dash-task-msg');
  const name = inp?.value?.trim();
  if (!name) {
    if (msg) { msg.style.color = 'var(--red)'; msg.textContent = 'Please enter a task name'; }
    inp?.focus(); return;
  }
  const current = appData?.task_categories || [];
  if (current.some(t => t.toLowerCase() === name.toLowerCase())) {
    if (msg) { msg.style.color = 'var(--red)'; msg.textContent = `"${name}" already exists`; }
    inp?.focus(); return;
  }
  if (msg) { msg.style.color = 'var(--muted)'; msg.textContent = 'Saving…'; }
  const r = await api('POST', '/api/admin/task-categories', { name });
  if (!r.ok) {
    if (msg) { msg.style.color = 'var(--red)'; msg.textContent = r.data?.error || 'Failed'; }
    return;
  }
  // Refresh appData
  const d = await api('GET', '/api/data');
  if (d.ok) appData = d.data;
  // Add the new pill to the list
  const tags = document.getElementById('dash-existing-tasks');
  if (tags) {
    const pill = document.createElement('span');
    pill.style.cssText = 'background:var(--green-soft);color:var(--green);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600';
    pill.textContent = name;
    tags.appendChild(pill);
  }
  if (inp)  inp.value = '';
  if (msg)  { msg.style.color = 'var(--green)'; msg.textContent = `✅ "${name}" added! Type another or click Cancel.`; }
  toast(`Task "${name}" added`, 'success');
  setTimeout(() => inp?.focus(), 100);
}

// Legacy wrapper kept for any old references
function openAddTaskModal() { showDashAddTask(); }


async function saveNewTask() {
  const name  = document.getElementById('new-task-name')?.value?.trim();
  const msgEl = document.getElementById('add-task-msg');
  if (!name) { if(msgEl) { msgEl.style.color='var(--red)'; msgEl.textContent='Task name is required'; } return; }

  // Check duplicate
  const current = appData?.task_categories || [];
  if (current.map(t=>t.toLowerCase()).includes(name.toLowerCase())) {
    if(msgEl) { msgEl.style.color='var(--red)'; msgEl.textContent='Task "'+name+'" already exists'; } return;
  }

  const r = await api('POST', '/api/admin/task-categories', { name });
  if (!r.ok) { if(msgEl) { msgEl.style.color='var(--red)'; msgEl.textContent = r.data?.error || 'Failed'; } return; }

  toast('Task "'+name+'" added!', 'success');
  // Refresh appData
  const d = await api('GET', '/api/data');
  if (d.ok) appData = d.data;
  closeModal();
}

  const overdueMs  = milestones.filter(m => {

  // ── KPI Cards ────────────────────────────────────────────────────────────────

  // ── Today's Hours per Employee (sum all sessions) ────────────────────────────

      empTodayMap[eid].project  = s.project;
      empTodayMap[eid].module   = s.module;

  document.getElementById('dash-active-count').textContent = active.length + ' active · ' + empList.length + ' worked';

  const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4'];

  }

  // ── Project Budget Health (progress rings style) ──────────────────────────────
  const activeProjs = projects.filter(p => p.used_seconds > 0);
  if (!activeProjs.length) {

      </div>`;
    }).join('');

  // ── This Week Summary ─────────────────────────────────────────────────────────

        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">

          </div>

            <div style="height:7px;border-radius:99px;background:${cols[i%5]};width:${w}%;transition:width .5s"></div>
          </div>
        </div>`;
      }).join('');
  }

  // ── Team Attendance Today ─────────────────────────────────────────────────────
  const allEmps  = appData?.employees || [];
  const punchedIn  = new Set(allSess.map(s => s.employee_id));
  const activeSet  = new Set(active.map(s => s.employee_id));

  // Sort: active first, then punched in, then absent
  const empsSorted = [...allEmps].sort((a,b) => {
    const aA = activeSet.has(a.id) ? 0 : punchedIn.has(a.id) ? 1 : 2;
    const bA = activeSet.has(b.id) ? 0 : punchedIn.has(b.id) ? 1 : 2;
    return aA - bA || a.name.localeCompare(b.name);
  });

    // Build per-employee hours map from today's sessions
  const empHoursMap = {};
  allSess.forEach(s => {
    if (!s.employee_id) return;
    if (!empHoursMap[s.employee_id]) empHoursMap[s.employee_id] = 0;
    if (s.is_open) {
      const elapsed = (Date.now() - new Date(s.punch_in_iso || s.punch_in).getTime()) / 1000;
      empHoursMap[s.employee_id] += Math.max(0, elapsed);
    } else if (s.duration) {
      empHoursMap[s.employee_id] += parseDurationToSec(s.duration);
    }
  });

  const REQUIRED_SEC  = 8 * 3600;
  const CUTOFF_SEC    = 30 * 60;
  const totalTeamSec  = Object.values(empHoursMap).reduce((a,b)=>a+b, 0);

  // Put chips in header
  const teamChipsEl = document.getElementById('dash-team-chips');
  if (teamChipsEl) {
    teamChipsEl.innerHTML =
      '<span style="background:var(--green-soft);color:var(--green);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700">🟢 ' + active.length + ' Active</span>' +
      '<span style="background:var(--accent-soft);color:var(--accent-dark);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700">✓ ' + (punchedIn.size - active.length) + ' Done</span>' +
      '<span style="background:var(--surface2);color:var(--muted);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700">— ' + (allEmps.length - punchedIn.size) + ' Absent</span>';
  }

  document.getElementById('dash-team').innerHTML =
    '<div style="display:flex;flex-wrap:wrap;gap:10px">' +
    empsSorted.map(e => {
      const isActive    = activeSet.has(e.id);
      const hasPunched  = punchedIn.has(e.id);
      const rawSec      = empHoursMap[e.id] || 0;
      const effectiveSec = rawSec > CUTOFF_SEC ? rawSec - CUTOFF_SEC : rawSec;
      const hasHours    = rawSec > 0;
      const metTarget   = effectiveSec >= REQUIRED_SEC;

      // Border/ring color
      const ringCol = isActive ? 'var(--green)' : hasPunched ? (metTarget ? 'var(--green)' : 'var(--red)') : 'var(--border)';
      // Avatar bg
      const colors  = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4'];
      const avatarBg = hasPunched || isActive ? colors[(e.name||'').charCodeAt(0) % colors.length] : '#94a3b8';
      // Status dot
      const dotCol  = isActive ? 'var(--green)' : hasPunched ? (metTarget ? 'var(--green)' : 'var(--red)') : 'var(--border)';
      const initials = e.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

      // Tooltip text
      const tipHours = hasHours
        ? secondsToHHMM(effectiveSec) + ' effective (−30m lunch)'
        : 'No sessions today';
      const tipStatus = isActive ? ' · Active' : hasPunched ? (metTarget ? ' · ✅ Full day' : ' · ⚠ Under 8h') : ' · Absent';
      const tooltip   = escHtml(e.name) + ' — ' + tipHours + tipStatus;

      return '<div class="emp-avatar-wrap" title="' + tooltip + '" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;position:relative">' +
        '<div style="width:42px;height:42px;border-radius:50%;background:' + avatarBg + ';color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2.5px solid ' + ringCol + ';position:relative;transition:transform .15s">' +
          initials +
          '<span style="position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:' + dotCol + ';border:2px solid var(--surface)"></span>' +
        '</div>' +
        '<div style="font-size:9px;font-weight:600;color:var(--muted);max-width:46px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(e.name.split(' ')[0]) + '</div>' +
        // Hover tooltip bubble
        '<div class="emp-tooltip" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1e293b;color:white;border-radius:8px;padding:7px 10px;font-size:11px;white-space:nowrap;z-index:99;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)">' +
          '<div style="font-weight:700;margin-bottom:2px">' + escHtml(e.name) + '</div>' +
          (hasHours
            ? '<div style="color:' + (metTarget ? '#4ade80' : '#f87171') + ';font-family:monospace;font-weight:800">' + secondsToHHMM(effectiveSec) + ' effective</div>' +
              '<div style="color:#94a3b8;font-size:10px">Logged ' + secondsToHHMM(rawSec) + ' − 30m lunch</div>'
            : '<div style="color:#f87171">No sessions today</div>') +
          (isActive ? '<div style="color:#4ade80;font-size:10px">● Working now</div>' : '') +
          (!metTarget && hasHours && !isActive ? '<div style="color:#f87171;font-size:10px">⚠ Under 8h by ' + secondsToHHMM(REQUIRED_SEC - effectiveSec) + '</div>' : '') +
          '<div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#1e293b;clip-path:polygon(0 0,100% 0,50% 100%)"></div>' +
        '</div>' +
      '</div>';
    }).join('') +
    '</div>';
}

async function loadDailyHours() {
  const from  = document.getElementById('dh-from')?.value || '';
  const to    = document.getElementById('dh-to')?.value   || '';
  const empId = document.getElementById('dh-emp')?.value  || '';
  const el    = document.getElementById('dh-content');
  if (!el) return;
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  let url = `/api/admin/sessions?from=${from}&to=${to}`;
  if (empId) url += `&emp_id=${empId}`;
  const r = await api('GET', url);
  if (!r.ok || !r.data.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No sessions in this range</div></div>';
    return;
  }

  const REQUIRED = 8 * 3600, LUNCH = 30 * 60;
  // Group by employee+date
  const dayMap = {};
  r.data.forEach(s => {
    if (s.is_open) return;
    const dk = s.punch_in.slice(0,10);
    const key = (s.employee_id||s.employee)+'|'+dk;
    if (!dayMap[key]) dayMap[key] = { name: s.employee, date: dk, sec: 0 };
    dayMap[key].sec += parseDurationToSec(s.duration||'0:0:0');
  });

  const rows = Object.values(dayMap).sort((a,b)=>a.date.localeCompare(b.date)||a.name.localeCompare(b.name));
  if (!rows.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No completed sessions</div></div>';
    return;
  }

  // Group by date
  const byDate = {};
  rows.forEach(row => { if (!byDate[row.date]) byDate[row.date]=[]; byDate[row.date].push(row); });

  el.innerHTML = Object.entries(byDate).map(([date, emps]) => {
    const totalEff = emps.reduce((a,e)=>a+Math.max(0,e.sec-LUNCH),0);
    const under    = emps.filter(e=>(e.sec-LUNCH)<REQUIRED).length;
    const dateStr  = new Date(date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});
    return '<div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">'
      + '<div style="padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'
      + '<div style="font-size:14px;font-weight:800;color:var(--text)">'+dateStr+'</div>'
      + '<div style="display:flex;gap:12px;align-items:center;font-size:12px">'
      + (under>0?'<span style="color:var(--red);font-weight:700">⚠ '+under+' under 8h</span>':'<span style="color:var(--green);font-weight:700">✅ All met</span>')
      + '<span style="color:var(--muted)">Team: <strong style="color:var(--text)">'+secondsToHHMM(totalEff)+'</strong></span>'
      + '</div></div>'
      + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border)">'
      + emps.map(e => {
          const eff   = Math.max(0, e.sec - LUNCH);
          const met   = eff >= REQUIRED;
          const short = met ? 0 : REQUIRED - eff;
          const col   = met ? 'var(--green)' : 'var(--red)';
          const bg    = met ? 'var(--surface)' : 'var(--surface)';
          const pct   = Math.min(100, Math.round(eff / REQUIRED * 100));
          const barCol = met ? 'var(--green)' : eff > 6*3600 ? 'var(--amber)' : 'var(--red)';
          return '<div style="background:var(--surface);padding:14px 16px">'
            + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
            + '<div style="font-size:13px;font-weight:700;color:var(--text)">'+escHtml(e.name)+'</div>'
            + '<span style="font-size:18px">'+(met?'✅':'🔴')+'</span>'
            + '</div>'
            + '<div style="font-family:monospace;font-size:22px;font-weight:900;color:'+col+'">'+secondsToHHMM(eff)+'</div>'
            + '<div style="margin:6px 0 4px;background:var(--border);border-radius:99px;height:5px;overflow:hidden">'
            + '<div style="height:5px;border-radius:99px;background:'+barCol+';width:'+pct+'%;transition:width .4s"></div></div>'
            + '<div style="font-size:10px;color:var(--muted)">'+pct+'% of 8h · Logged '+secondsToHHMM(e.sec)+'</div>'
            + (short>0?'<div style="font-size:10px;color:var(--red);font-weight:700;margin-top:2px">Short by '+secondsToHHMM(short)+'</div>':'')
            + '</div>';
        }).join('')
      + '</div></div>';
  }).join('');
}

async function loadAttendanceGaps() {
  const container = document.getElementById('ag-content');
  if (!container) return;

  const from = document.getElementById('ag-from')?.value;
  const to   = document.getElementById('ag-to')?.value;

  container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

  try {
    const res = await api('GET', `/api/admin/sessions?from=${from}&to=${to}`);
    if (!res.ok || !res.data) throw new Error("API failed");

    const data = res.data;

    // ── Build all working days in range (Mon–Fri only) ───────────────────
    const allWorkDays = [];
    const dCur = new Date(from + 'T00:00:00');
    const dEnd = new Date(to   + 'T00:00:00');
    while (dCur <= dEnd) {
      const dow = dCur.getDay();
      if (dow !== 0 && dow !== 6) allWorkDays.push(dCur.toISOString().slice(0,10));
      dCur.setDate(dCur.getDate() + 1);
    }

    // ── Group logged seconds per employee per day ────────────────────────
    const empDayMap   = {};  // { empId: { date: sec } }
    const empNameMap  = {};  // { empId: name }

    data.forEach(s => {
      if (!s.punch_out) return;

      const empId = s.employee_id;
      const date  = s.punch_in.split(' ')[0];
      const d     = new Date(date + 'T00:00:00');
      if (d.getDay() === 0 || d.getDay() === 6) return;

      empNameMap[empId] = s.employee;

      const sec = Math.max(0, (new Date(s.punch_out) - new Date(s.punch_in)) / 1000);
      if (!empDayMap[empId]) empDayMap[empId] = {};
      empDayMap[empId][date] = (empDayMap[empId][date] || 0) + sec;
    });

    // ── Also include all employees from appData so absent employees show ─
    const allEmps = appData?.employees || [];
    allEmps.forEach(e => {
      if (!empNameMap[e.id]) empNameMap[e.id] = e.name;
      if (!empDayMap[e.id])  empDayMap[e.id]  = {};
    });

    // ── Analyse each employee ────────────────────────────────────────────
    const result = [];

    Object.keys(empNameMap).forEach(empId => {
      const days       = empDayMap[empId] || {};
      const failedDays = [];
      let   weeklySec  = 0;

      // ── Week bucketing for 40h check ──────────────────────────────────
      const weekMap = {}; // weekKey -> { sec, days[] }

      allWorkDays.forEach(date => {
        const raw      = days[date] || 0;           // 0 = absent
        const adjusted = Math.max(0, raw - 1800);   // minus 30 min lunch
        const absent   = raw === 0;

        // weekly bucket
        const wk = getWeekKey(date);
        if (!weekMap[wk]) weekMap[wk] = { sec: 0, dates: [] };
        weekMap[wk].sec += adjusted;
        weekMap[wk].dates.push(date);

        weeklySec += adjusted;

        // Daily fail: absent OR under 8h effective
        if (absent) {
          failedDays.push({ date, raw: 0, adjusted: 0, absent: true });
        } else if (adjusted < 8 * 3600) {
          failedDays.push({ date, raw, adjusted, absent: false });
        }
      });

      // ── Weekly failures ───────────────────────────────────────────────
      const weeklyFails = Object.entries(weekMap)
        .filter(([, w]) => w.sec < 40 * 3600)
        .map(([wk, w]) => ({ weekKey: wk, sec: w.sec, short: 40*3600 - w.sec }));

      if (failedDays.length > 0 || weeklyFails.length > 0) {
        result.push({
          employee: empNameMap[empId],
          empId,
          weekly: weeklySec,
          failedDays,
          weeklyFails,
          absCount:   failedDays.filter(d => d.absent).length,
          shortCount: failedDays.filter(d => !d.absent).length,
        });
      }
    });

    function toHHMM(sec) {
      sec = Math.max(0, sec);
      return String(Math.floor(sec/3600)).padStart(2,'0') + ':' + String(Math.floor((sec%3600)/60)).padStart(2,'0');
    }

    if (result.length === 0) {
      container.innerHTML = `
        <div style="text-align:center;padding:48px">
          <div style="font-size:48px;margin-bottom:12px">🎉</div>
          <div style="font-size:16px;font-weight:700;color:var(--text)">All employees met their targets!</div>
          <div style="color:var(--muted);margin-top:6px">No attendance gaps in this period.</div>
        </div>`;
      return;
    }

    // ── Sort: most gaps first ─────────────────────────────────────────────
    result.sort((a,b) => (b.failedDays.length + b.weeklyFails.length) - (a.failedDays.length + a.weeklyFails.length));

    container.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">'
      + result.map(emp => {
          const initials  = emp.employee.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
          const avatarCols= ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444'];
          const avatarCol = avatarCols[emp.employee.charCodeAt(0) % avatarCols.length];
          const cardId    = 'agc_' + emp.empId.replace(/[^a-zA-Z0-9]/g,'');
          const weeklyOk  = emp.weekly >= 40*3600;

          // Detail rows: absent + short days sorted by date
          const dailyRows = emp.failedDays
            .sort((a,b) => a.date.localeCompare(b.date))
            .map(d => {
              const ds   = new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
              if (d.absent) {
                return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'
                  + '<span style="font-size:12px;color:var(--muted)">' + ds + '</span>'
                  + '<div style="display:flex;align-items:center;gap:6px">'
                  + '<span style="background:var(--red-soft);color:var(--red);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700">🔴 Absent</span>'
                  + '</div></div>';
              } else {
                const short = 8*3600 - d.adjusted;
                return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'
                  + '<span style="font-size:12px;color:var(--muted)">' + ds + '</span>'
                  + '<div style="text-align:right">'
                  + '<div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">'
                  + '<span style="background:var(--amber-soft);color:var(--amber);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700">🟠 ' + toHHMM(d.adjusted) + '</span>'
                  + '</div>'
                  + '<div style="font-size:10px;color:var(--muted);margin-top:2px">Logged ' + toHHMM(d.raw) + ' · short by <span style="color:var(--red);font-weight:700">' + toHHMM(short) + '</span></div>'
                  + '</div></div>';
              }
            }).join('');

          const weekRows = emp.weeklyFails.map(w => {
            return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'
              + '<span style="font-size:12px;color:var(--muted)">Week of ' + w.weekKey + '</span>'
              + '<div style="text-align:right">'
              + '<div style="font-family:monospace;font-size:12px;font-weight:800;color:var(--red)">' + toHHMM(w.sec) + ' / 40:00</div>'
              + '<div style="font-size:10px;color:var(--muted)">Short by <span style="color:var(--red);font-weight:700">' + toHHMM(w.short) + '</span></div>'
              + '</div></div>';
          }).join('');

          return '<div class="card" style="padding:0;overflow:hidden">'
            // ── Card header (always visible) ──────────────────────────────
            + '<div style="padding:16px 18px;display:flex;gap:12px;align-items:center;cursor:pointer" onclick="toggleGapCard(\'' + cardId + '\')">'
            + '<div style="width:44px;height:44px;border-radius:50%;background:' + avatarCol + ';color:white;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0">' + initials + '</div>'
            + '<div style="flex:1;min-width:0">'
            + '<div style="font-size:14px;font-weight:800;color:var(--text)">' + escHtml(emp.employee) + '</div>'
            + '<div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">'
            + (emp.absCount  > 0 ? '<span class="tag tag-red">'+ emp.absCount +' absent</span>' : '')
            + (emp.shortCount > 0 ? '<span class="tag" style="background:var(--amber-soft);color:var(--amber)">'+ emp.shortCount +' short</span>' : '')
            + (!weeklyOk ? '<span class="tag tag-red">' + toHHMM(emp.weekly) + ' / 40h</span>' : '<span class="tag tag-green">Weekly ✅</span>')
            + '</div>'
            + '</div>'
            + '<div id="' + cardId + '-arrow" style="font-size:16px;color:var(--muted)">▾</div>'
            + '</div>'
            // ── Expandable detail ─────────────────────────────────────────
            + '<div id="' + cardId + '" style="display:none;border-top:1px solid var(--border);padding:4px 18px 16px">'
            + (dailyRows ? '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:12px 0 4px">Daily Gaps</div>' + dailyRows : '')
            + (weekRows  ? '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:12px 0 4px">Weekly Shortfalls</div>' + weekRows : '')
            + '</div>'
            + '</div>';
        }).join('')
      + '</div>';

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Error loading attendance</div></div>`;
  }
}


function toggleGapCard(id) {
  const el    = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!el) return;
  const open  = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  if (arrow) arrow.textContent = open ? '▴' : '▾';
}

function getWeekKey(dateStr) {
  const d   = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}

async function saveEditSession(id) {
  const inDate  = document.getElementById('es-in-date').value;
  const inTime  = document.getElementById('es-in-time').value;
  const outDate = document.getElementById('es-out-date').value;
  const outTime = document.getElementById('es-out-time').value;

  const punch_in  = `${inDate} ${inTime}:00`;
  const punch_out = (outDate && outTime) ? `${outDate} ${outTime}:00` : null;
  const body = {
    employee_id: document.getElementById('es-emp').value,
    project_id: document.getElementById('es-proj').value,
    module: document.getElementById('es-mod').value,

  const r = await api('PUT', `/api/admin/sessions/${id}`, body);

async function deleteSession(id) {

  toast('Session deleted', 'success');
  loadAdminSessions();
}

let sumCache = null;
async function loadSummary() {
  const from = document.getElementById('sum-from').value;
  const to = document.getElementById('sum-to').value;
  // Fetch both: all-time project totals AND date-range employee summary
  const [projRes, empRes] = await Promise.all([
    api('GET', '/api/admin/project-totals'),
    api('GET', `/api/admin/summary?from=${from}&to=${to}`)
  ]);
  if (projRes.ok || empRes.ok) {
    sumCache = {
      project_totals: projRes.ok ? projRes.data : [],
      employee_summary: empRes.ok ? (empRes.data.employee_summary || []) : [],
      date_from: from, date_to: to,
      // Keep old project_summary for approvals tab compatibility
      project_summary: empRes.ok ? (empRes.data.project_summary || []) : [],
    };
  } else { sumCache = null; }
  const active = document.querySelector('.sub-tab.active');
  const tabId = active ? active.id.replace('sum-tab-','') : 'proj';
  switchSumTab(tabId);
}

function switchSumTab(tab) {
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.id === 'sum-tab-' + tab));
  const el = document.getElementById('sum-content');
  if (!el) return;
  if (!sumCache) { el.innerHTML = '<div class="empty">Load data first using the filter above</div>'; return; }

  const SC = {'1':'#2563eb','2':'#16a34a','3':'#d97706','4':'#dc2626'};
  function hhmm(sec) {
    sec = Math.max(0, Math.round(sec));
    return String(Math.floor(sec/3600)).padStart(2,'0') + ':' + String(Math.floor((sec%3600)/60)).padStart(2,'0');
  }
  function badge(txt, col) {
    return '<span style="display:inline-flex;align-items:center;background:'+col+'18;color:'+col
      +';border:1px solid '+col+'33;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;margin:2px">'+txt+'</span>';
  }
  function bar(pct, col, height) {
    var h = height||8; var p = Math.min(100,pct||0);
    var c = pct>=100?'#dc2626':(pct>80?'#f59e0b':col);
    return '<div style="background:var(--border);border-radius:99px;height:'+h+'px;overflow:hidden">'
      +'<div style="width:'+p+'%;height:'+h+'px;border-radius:99px;background:'+c+';transition:width .5s ease"></div></div>';
  }

  // ── PROJECT SUMMARY ───────────────────────────────────────────────────────
  if (tab === 'proj') {
    const rows = sumCache.project_totals || [];
    if (!rows.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No data yet</div></div>'; return; }
    el.innerHTML = rows.map(p => {
      const pct = p.pct || 0;
      const col = pct>=100?'#dc2626':(pct>80?'#f59e0b':'#2563eb');
      const remOk = p.remaining_sec > 0;

      // Module rows with task breakdown
      const modHtml = (p.modules||[]).map(m => {
        const taskHtml = (m.tasks||[]).map(t => {
          const tc  = SC[String(t.soi_level)] || '#64748b';
          const soiB = t.soi_level ? badge('SOI-'+t.soi_level, tc) : '';
          const remC = (t.remaining_sec === 0 && t.planned_sec > 0) ? '#dc2626' : '#16a34a';
          return '<tr style="background:var(--surface2)">'
            +'<td style="padding:5px 14px 5px 32px;font-size:12px;color:var(--muted)">'+escHtml(t.task)+soiB+'</td>'
            +'<td style="padding:5px 14px;font-family:monospace;font-size:12px;font-weight:700;color:#2563eb">'+t.used_hhmm+'</td>'
            +'<td style="padding:5px 14px;font-family:monospace;font-size:12px;color:var(--muted)">'+(t.planned_hhmm||'—')+'</td>'
            +'<td style="padding:5px 14px;font-family:monospace;font-size:12px;color:'+remC+'">'+(t.remaining_hhmm||'—')+'</td>'
            +'</tr>';
        }).join('');
        return '<tr style="background:var(--surface2);border-top:1px solid var(--border)">'
          +'<td style="padding:9px 14px 9px 18px;font-size:13px;font-weight:700;color:var(--text)">▸ '+escHtml(m.module)+'</td>'
          +'<td style="padding:9px 14px;font-family:monospace;font-size:13px;font-weight:800;color:#2563eb">'+m.used_hhmm+'</td>'
          +'<td style="padding:9px 14px;font-size:12px;color:var(--muted)">—</td>'
          +'<td style="padding:9px 14px;font-size:12px;color:var(--muted)">—</td>'
          +'</tr>'+taskHtml;
      }).join('');

      const soiHtml = (p.soi_plan||[]).map(s => {
        return badge('SOI-'+s.soi_level+' · '+s.task_name+(s.planned_pct>0?' · '+s.planned_pct+'%':''), SC[String(s.soi_level)]||'#64748b');
      }).join('');

      return '<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)">'
        // ── Header ──
        +'<div style="padding:20px 24px 16px;display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div>'
        +'<div style="font-size:17px;font-weight:800;color:var(--text)">'+escHtml(p.name)+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px">'
        +'<span style="background:var(--accent-soft);color:var(--accent);border-radius:4px;padding:1px 7px;font-weight:700">'+escHtml(p.code)+'</span>'
        +(p.pct!==null?'<span style="color:'+(pct>=100?'#dc2626':'#64748b')+'">'+pct+'% used</span>':'')
        +'</div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-family:monospace;font-size:28px;font-weight:900;color:#2563eb;letter-spacing:-1px">'+p.used_hhmm+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:1px">'+(p.planned_hours>0?'of <strong>'+p.planned_hhmm+'</strong> planned':'All time used')+'</div>'
        +(p.remaining_hhmm?'<div style="font-size:12px;font-weight:700;margin-top:3px;color:'+(remOk?'#16a34a':'#dc2626')+'">'+(remOk?'⏳ '+p.remaining_hhmm+' remaining':'⚠ Budget exceeded')+'</div>':'')
        +'</div>'
        +'</div>'
        // ── Progress bar ──
        +(p.planned_hours>0?'<div style="padding:0 24px 16px">'+bar(pct,'#2563eb',10)+'<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--muted)">0%</span><span style="font-size:12px;font-weight:700;color:'+col+'">'+pct+'%</span><span style="font-size:11px;color:var(--muted)">100%</span></div></div>':'')
        // ── Module/Task table ──
        +(modHtml?'<div style="border-top:1px solid var(--border)"><table style="width:100%;border-collapse:collapse">'
          +'<thead><tr style="background:var(--surface2)">'
          +'<th style="padding:8px 14px 8px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px">Module / Task</th>'
          +'<th style="padding:8px 14px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px">Used</th>'
          +'<th style="padding:8px 14px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px">Planned</th>'
          +'<th style="padding:8px 14px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px">Remaining</th>'
          +'</tr></thead><tbody>'+modHtml+'</tbody></table></div>':'')
        // ── SOI plan footer ──
        +(soiHtml?'<div style="padding:12px 20px;border-top:1px solid var(--border);background:var(--surface)">'
          +'<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">SOI Level Plan</div>'
          +soiHtml+'</div>':'')
        +'</div>';
    }).join('');

  // ── SOI DETAILS TAB ───────────────────────────────────────────────────────
  } else if (tab === 'soi') {
    const rows = sumCache.project_totals || [];
    if (!rows.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No SOI data. Load summary first.</div></div>'; return; }
    const projsWithSoi = rows.filter(p => (p.soi_plan||[]).length > 0);
    if (!projsWithSoi.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No SOI plan defined yet. Edit a project to assign SOI levels.</div></div>'; return; }
    const SC2 = {'1':'#2563eb','2':'#16a34a','3':'#d97706','4':'#dc2626'};
    el.innerHTML = projsWithSoi.map(p => {
      // Aggregate used hours per task across all modules
      const taskUsed = {};
      (p.modules||[]).forEach(m => {
        (m.tasks||[]).forEach(t => { taskUsed[t.task] = (taskUsed[t.task]||0) + (t.used_sec||0); });
      });
      const planSec = p.planned_hours > 0 ? Math.round(p.planned_hours * 3600) : 0;
      const soiSorted = [...(p.soi_plan||[])].sort((a,b) => a.soi_level - b.soi_level);
      const rowsHtml = soiSorted.map(s => {
        const col      = SC2[String(s.soi_level)] || '#64748b';
        const usedSec  = taskUsed[s.task_name] || 0;
        const tPlanSec = (planSec > 0 && s.planned_pct > 0) ? Math.round(planSec * s.planned_pct / 100) : 0;
        const remSec   = tPlanSec > 0 ? Math.max(0, tPlanSec - usedSec) : null;
        const pct2     = tPlanSec > 0 ? Math.min(100, Math.round(usedSec / tPlanSec * 100)) : null;
        const remC     = (remSec === 0 && tPlanSec > 0) ? '#dc2626' : '#16a34a';
        const barHtml  = pct2 !== null
          ? '<div style="min-width:110px">'
            + '<div style="background:var(--border);border-radius:99px;height:7px;overflow:hidden">'
            + '<div style="width:' + Math.min(100,pct2) + '%;height:7px;border-radius:99px;background:'
            + (pct2>=100 ? '#dc2626' : pct2>80 ? '#f59e0b' : col) + ';transition:width .4s"></div></div>'
            + '<div style="font-size:11px;font-weight:700;color:' + (pct2>=100?'#dc2626':pct2>80?'#f59e0b':col) + ';margin-top:3px">' + pct2 + '%</div>'
            + '</div>'
          : '<span style="color:var(--muted);font-size:12px">—</span>';
        return '<tr style="border-top:1px solid var(--border)">'
          + '<td style="padding:12px 18px;white-space:nowrap">'
          +   '<div style="display:flex;align-items:center;gap:8px">'
          +   '<span style="background:' + col + ';color:white;border-radius:7px;padding:3px 10px;font-size:12px;font-weight:800;white-space:nowrap">SOI-' + s.soi_level + '</span>'
          +   '<span style="font-size:13px;font-weight:600;color:var(--text)">' + escHtml(s.task_name) + '</span>'
          +   '</div></td>'
          + (s.planned_pct > 0
              ? '<td style="padding:12px 18px;font-size:12px;color:var(--muted);font-weight:600">' + s.planned_pct + '% of budget</td>'
              : '<td style="padding:12px 18px;color:var(--muted)">—</td>')
          + '<td style="padding:12px 18px;font-family:monospace;font-size:13px;font-weight:800;color:' + col + '">' + hhmm(usedSec) + '</td>'
          + '<td style="padding:12px 18px;font-family:monospace;font-size:13px;color:var(--muted)">' + (tPlanSec ? hhmm(tPlanSec) : '—') + '</td>'
          + '<td style="padding:12px 18px;font-family:monospace;font-size:13px;font-weight:700;color:' + (remSec!==null ? remC : '#cbd5e1') + '">' + (remSec!==null ? hhmm(remSec) : '—') + '</td>'
          + '<td style="padding:12px 18px">' + barHtml + '</td>'
          + '</tr>';
      }).join('');
      const totUsed = soiSorted.reduce((a,s) => a + (taskUsed[s.task_name]||0), 0);
      const totPlan = soiSorted.reduce((a,s) => a + (planSec>0&&s.planned_pct>0 ? Math.round(planSec*s.planned_pct/100) : 0), 0);
      const totRem  = Math.max(0, totPlan - totUsed);
      const projPct = p.pct || 0;
      const projCol = projPct >= 100 ? '#dc2626' : projPct > 80 ? '#f59e0b' : '#2563eb';
      return '<div class="card" style="margin-bottom:24px;padding:0;overflow:hidden;border:1px solid var(--border);border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.07)">'
        // ── Project header
        + '<div style="padding:18px 24px;background:var(--surface2);border-bottom:2px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">'
        +   '<div style="display:flex;align-items:center;gap:12px">'
        +     '<div style="width:42px;height:42px;background:linear-gradient(135deg,#2563eb,#16a34a);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎯</div>'
        +     '<div>'
        +       '<div style="font-size:17px;font-weight:800;color:var(--text)">' + escHtml(p.name) + '</div>'
        +       '<div style="display:flex;align-items:center;gap:8px;margin-top:3px">'
        +         '<span style="background:var(--accent-soft);color:var(--accent);border-radius:5px;padding:1px 8px;font-size:11px;font-weight:700">' + escHtml(p.code) + '</span>'
        +         '<span style="font-size:11px;color:var(--muted)">' + soiSorted.length + ' SOI stage' + (soiSorted.length>1?'s':'') + '</span>'
        +       '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div style="text-align:right">'
        +     '<div style="font-family:monospace;font-size:24px;font-weight:900;color:#2563eb;letter-spacing:-1px">' + hhmm(totUsed) + '</div>'
        +     '<div style="font-size:11px;color:var(--muted)">' + (p.planned_hours>0 ? 'of ' + p.planned_hhmm + ' planned' : 'total used') + '</div>'
        +     (p.planned_hours>0 && p.pct!==null ? '<div style="font-size:12px;font-weight:700;color:'+projCol+';margin-top:2px">'+projPct+'% complete</div>' : '')
        +   '</div>'
        + '</div>'
        // ── Project-level progress bar
        + (p.planned_hours > 0
          ? '<div style="padding:10px 24px;background:var(--surface2);border-bottom:1px solid var(--border)">'
          +   '<div style="background:var(--border);border-radius:99px;height:9px;overflow:hidden">'
          +   '<div style="width:'+Math.min(100,projPct)+'%;height:9px;border-radius:99px;background:'+projCol+';transition:width .5s"></div></div>'
          +   '<div style="display:flex;justify-content:space-between;margin-top:4px">'
          +   '<span style="font-size:11px;color:var(--muted)">0%  ·  Overall Project Progress</span>'
          +   '<span style="font-size:11px;font-weight:700;color:'+projCol+'">'+projPct+'%  ·  100%</span></div>'
          + '</div>' : '')
        // ── SOI stages table
        + '<table style="width:100%;border-collapse:collapse">'
        +   '<thead><tr style="background:var(--surface2)">'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">SOI Stage &amp; Task</th>'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Budget %</th>'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Used</th>'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Planned</th>'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Remaining</th>'
        +   '<th style="padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Progress</th>'
        +   '</tr></thead>'
        +   '<tbody>' + rowsHtml + '</tbody>'
        + '</table>'
        // ── Footer totals row
        + (totPlan > 0
          ? '<div style="padding:11px 18px;background:var(--surface2);border-top:2px solid var(--border);display:flex;gap:28px;flex-wrap:wrap;align-items:center">'
          +   '<span style="font-size:13px;font-weight:800;color:#2563eb">Used: ' + hhmm(totUsed) + '</span>'
          +   '<span style="font-size:13px;color:var(--muted)">Planned: ' + hhmm(totPlan) + '</span>'
          +   '<span style="font-size:13px;font-weight:800;color:'+(totRem===0?'#dc2626':'#16a34a')+'">Remaining: ' + hhmm(totRem) + '</span>'
          + '</div>' : '')
        + '</div>';
    }).join('');

    } else if (tab === 'emp') {
    const rows = sumCache.employee_summary || [];
    if (!rows.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">No employee data for this period</div></div>'; return; }
    el.innerHTML = '<div class="card" style="padding:0"><div class="table-wrap"><table>'
      +'<thead><tr><th>Employee</th><th>Project</th><th>Module</th><th>Hours</th><th>Status</th></tr></thead><tbody>'
      +rows.map(r=>'<tr>'
        +'<td><strong>'+escHtml(r.employee)+'</strong></td>'
        +'<td>'+escHtml(r.project)+'</td>'
        +'<td>'+(r.module&&r.module!=='-'?'<span class="tag tag-blue">'+escHtml(r.module)+'</span>':'—')+'</td>'
        +'<td style="font-family:monospace;font-weight:700;color:#2563eb">'+(r.hours_hhmm||r.hours.toFixed(2)+'h')+'</td>'
        +'<td>'+(r.approved?'<span class="tag tag-green">✓ Approved</span>':'<span class="tag tag-amber">Pending</span>')+'</td>'
        +'</tr>').join('')
      +'</tbody></table></div></div>';

  // ── EMAIL ─────────────────────────────────────────────────────────────────
  } else if (tab === 'import') {
    el.innerHTML = `
      <div class="card" style="max-width:680px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
          <div style="width:50px;height:50px;background:linear-gradient(135deg,#2563eb,#16a34a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📥</div>
          <div>
            <div style="font-size:17px;font-weight:800;color:var(--text)">Import Sessions from Excel</div>
            <div style="font-size:12px;color:var(--muted)">Bulk-upload punch in/out records from a spreadsheet</div>
          </div>
        </div>

        <!-- Step 1 -->
        <div style="display:flex;gap:14px;margin-bottom:18px;align-items:flex-start">
          <div style="width:28px;height:28px;background:#2563eb;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">1</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px">Download the template</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Fill in employee codes, project codes, dates and punch times. Delete the sample rows before importing.</div>
            <a href="/api/admin/import-template" download="pulse_import_template.xlsx">
              <button class="btn btn-primary" style="gap:8px">⬇️ Download Template (.xlsx)</button>
            </a>
          </div>
        </div>

        <div style="border-top:1px dashed #e2e8f0;margin:0 0 18px"></div>

        <!-- Step 2 -->
        <div style="display:flex;gap:14px;margin-bottom:18px;align-items:flex-start">
          <div style="width:28px;height:28px;background:#16a34a;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">2</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px">Upload your filled file</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Supports .xlsx files. Max 500 rows per import. Duplicates are automatically skipped.</div>
            <div id="drop-zone" style="border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)"
              onclick="document.getElementById('import-file-input').click()"
              ondragover="event.preventDefault();this.style.borderColor='#2563eb';this.style.background='#eff6ff'"
              ondragleave="this.style.borderColor='#cbd5e1';this.style.background='#f8fafc'"
              ondrop="handleImportDrop(event)">
              <div style="font-size:32px;margin-bottom:8px">📂</div>
              <div style="font-size:14px;font-weight:600;color:var(--muted)">Click to choose or drag & drop your Excel file</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px">.xlsx files only</div>
            </div>
            <input type="file" id="import-file-input" accept=".xlsx" style="display:none" onchange="handleImportFile(this.files[0])"/>
            <div id="import-file-name" style="margin-top:8px;font-size:12px;color:var(--muted);min-height:20px"></div>
          </div>
        </div>

        <div style="border-top:1px dashed #e2e8f0;margin:0 0 18px"></div>

        <!-- Step 3 -->
        <div style="display:flex;gap:14px;margin-bottom:6px;align-items:flex-start">
          <div style="width:28px;height:28px;background:#d97706;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">3</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Run import</div>
            <button class="btn btn-primary" id="import-run-btn" onclick="runImport()" disabled
              style="opacity:.5;cursor:not-allowed;min-width:160px">
              🚀 Import Now
            </button>
          </div>
        </div>

        <!-- Results -->
        <div id="import-results" style="margin-top:20px"></div>
      </div>
    `;

  } else if (tab === 'email') {
    (async () => {
      const r   = await api('GET', '/api/admin/email-status');
      const cfg = r.ok ? r.data : {};
      const ok  = cfg.configured;
      const smtpStatus = ok
        ? '<span style="display:inline-flex;align-items:center;gap:5px;background:var(--green-soft);color:#15803d;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700">✅ SMTP Connected</span>'
        : '<span style="display:inline-flex;align-items:center;gap:5px;background:var(--amber-soft);color:var(--amber);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700">⚠ SMTP Not Configured</span>';

      function alertCard(icon, title, desc, schedule, threshold, thresholdLabel, statusOk) {
        return '<div style="border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px">'
          + '<div style="padding:14px 18px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'
          + '<div style="display:flex;align-items:center;gap:10px">'
          + '<span style="font-size:20px">' + icon + '</span>'
          + '<div><div style="font-size:13px;font-weight:700;color:var(--text)">' + title + '</div>'
          + '<div style="font-size:11px;color:var(--muted);margin-top:2px">⏰ ' + schedule + '</div></div></div>'
          + (statusOk
              ? '<span style="background:var(--green-soft);color:#15803d;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700">✅ Active</span>'
              : '<span style="background:var(--amber-soft);color:var(--amber);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700">⚠ Needs SMTP</span>')
          + '</div>'
          + '<div style="padding:12px 18px;font-size:12px;color:var(--muted);line-height:1.7">' + desc + '</div>'
          + (threshold !== null
              ? '<div style="padding:10px 18px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px">'
              +   '<span style="font-size:12px;color:var(--muted);font-weight:600">Threshold:</span>'
              +   '<span style="font-size:18px;font-weight:900;color:var(--accent);font-family:monospace">' + threshold + '</span>'
              +   '<span style="font-size:12px;color:var(--muted)">' + thresholdLabel + '</span></div>'
              : '')
          + '</div>';
      }

      el.innerHTML = ''
        // ── Header ────────────────────────────────────────────────────────────
        + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px">'

        +     '<div style="width:48px;height:48px;background:linear-gradient(135deg,#2563eb,#16a34a);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px">📧</div>'
        +     '<div><div style="font-size:17px;font-weight:800;color:var(--text)">Email Alerts & Reports</div>'
        +     '<div style="font-size:12px;color:var(--muted);margin-top:3px">All automated notifications in one place</div></div>'
        +   '</div>'
        +   smtpStatus
        + '</div>'

        // ── SMTP config strip ─────────────────────────────────────────────────
        + '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-size:12px">'
        +   '<div><div style="color:var(--muted);font-weight:600;margin-bottom:3px">SMTP Host</div><div style="font-family:monospace;color:var(--text)">' + escHtml(cfg.smtp_host||'—') + '</div></div>'
        +   '<div><div style="color:var(--muted);font-weight:600;margin-bottom:3px">Auth User</div><div style="font-family:monospace;color:var(--text)">' + escHtml(cfg.smtp_user||'—') + '</div></div>'
        +   '<div><div style="color:var(--muted);font-weight:600;margin-bottom:3px">Reports To</div><div style="font-family:monospace;color:var(--text)">' + escHtml(cfg.report_to||'—') + '</div></div>'
        +   (!ok ? '<div style="grid-column:1/-1;font-size:11px;color:var(--amber)">Set <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">SMTP_USER</code>, <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">SMTP_PASS</code>, <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">SMTP_FROM</code> env vars then restart.</div>' : '')
        + '</div>'

        // ── Alert cards ───────────────────────────────────────────────────────
        + '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px">Automated Alerts & Reports</div>'

        + alertCard('📊', 'Daily Summary Report',
            'Sends a full breakdown of all sessions logged the previous day — project hours, employee contributions, and budget burn.',
            'Every day at 08:30 AM  ·  Sent to: ' + escHtml(cfg.report_to||'—'),
            null, null, ok)

        + alertCard('📅', 'Weekly Digest',
            'Covers the full previous week (Mon–Sun) with total hours per project, team contributions, and budget usage trends.',
            'Every Monday at 08:30 AM  ·  Sent to: ' + escHtml(cfg.report_to||'—'),
            null, null, ok)

        + alertCard('🔔', 'Unpunched-Out Alert',
            'Sent at end of day if an employee still has an open session. <strong>To:</strong> employee email · <strong>CC:</strong> manager. Employee is reminded to punch out or contact their manager.',
            'Every day at 11:55 PM  ·  User alert + Manager CC',

        // ── Threshold config notice ───────────────────────────────────────────
        + '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:22px;font-size:12px;color:var(--muted);line-height:1.8">'
        + '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">⚙️ Configure via Environment Variables</div>'
        + '<code style="background:var(--surface);padding:2px 7px;border-radius:4px;margin-right:8px">REPORT_TO=manager@co.com</code> Manager / report recipient address'
        + '</div>'

        // ── Manual send ───────────────────────────────────────────────────────
        + '<div style="border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">'
        +   '<div style="font-size:13px;font-weight:700;color:var(--text);width:100%;margin-bottom:4px">📤 Send Daily Report Manually</div>'
        +   '<div class="form-group" style="margin:0;flex:1;min-width:160px"><label class="form-label">Select Date</label>'
        +   '<input class="form-input" type="date" id="email-date" value="' + new Date(Date.now()-86400000).toISOString().slice(0,10) + '"/></div>'
        +   '<button class="btn btn-primary" onclick="sendManualReport()">📤 Send Now</button>'
        + '</div>'
        + '<div id="email-msg" style="margin-top:12px;font-size:13px"></div>';
    })();

  // ── APPROVALS ─────────────────────────────────────────────────────────────
  } else if (tab === 'approvals') {
    loadApprovals();
  }
}

async function loadApprovals() {
  const from = document.getElementById('sum-from').value;
  const to = document.getElementById('sum-to').value;
  const r = await api('GET', `/api/admin/approvals?from=${from}&to=${to}`);
  const el = document.getElementById('sum-content');
  if (!el) return;
  if (!r.ok) { el.innerHTML = '<div class="empty">Failed to load</div>'; return; }
  el.innerHTML = `<div class="card">
    <div class="card-title">Employee Approvals — ${from} to ${to}</div>
    ${r.data.map(e => `
      <div class="approval-row">
        <div>
          <div style="font-weight:600">${escHtml(e.name)}</div>
          <div style="font-size:12px;color:var(--muted)">${e.approved ? '✓ Approved' : 'Not yet approved'}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${e.approved ? 'checked' : ''} onchange="toggleApproval('${e.employee_id}', this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    `).join('')}
  </div>`;
}

async function toggleApproval(emp_id, approved) {
  const from = document.getElementById('sum-from').value;
  const to = document.getElementById('sum-to').value;
  const r = await api('POST', '/api/admin/approvals', { employee_id: emp_id, date_from: from, date_to: to, approved });
  if (!r.ok) { toast('Failed to update approval', 'error'); return; }
  toast(approved ? 'Approved' : 'Approval revoked', 'success');
}

async function exportExcel() {
  const from = document.getElementById('sum-from').value;
  const to = document.getElementById('sum-to').value;
  if (!from || !to) { toast('Select date range first', 'error'); return; }
  toast('Generating export…', 'info');
  const btn = event.target;
  btn.disabled = true;
  try {

// ── Task checkbox pill toggles ──────────────────────────────────────────────
function _toggleTaskPill(label, taskName, hiddenId) {
  const chk    = label.querySelector('input[type="checkbox"]');
  const hidden = document.getElementById(hiddenId);
  if (!chk || !hidden) return;

  const active = !chk.checked;
  chk.checked  = active;

  // Update visual style
  label.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
  label.style.background  = active ? 'var(--accent-soft)' : 'var(--surface)';
  label.style.color       = active ? 'var(--accent)' : 'var(--muted)';

  // Update hidden value
  const current = hidden.value ? hidden.value.split(',').map(t=>t.trim()).filter(Boolean) : [];
  if (active) {
    if (!current.map(t=>t.toLowerCase()).includes(taskName.toLowerCase())) {
      current.push(taskName);
    }
  } else {
    const idx = current.findIndex(t => t.toLowerCase() === taskName.toLowerCase());
    if (idx > -1) current.splice(idx, 1);
  }
  hidden.value = current.join(',');

  // Sync SOI Level Plan table — show/hide row for this task
  // Prefix is derived from hiddenId: 'ep-tasks' -> 'ep', 'ap-tasks' -> 'ap'
  const prefix = hiddenId.replace('-tasks', '');
  _syncSoiRowVisibility(prefix, taskName, active);
}

// Show or hide a task's row in the SOI table based on whether it is ticked
function _syncSoiRowVisibility(prefix, taskName, visible) {
  // The SOI table lives inside the modal — find the row by data-soi-task attribute
  // Check both possible table parents (modal may have multiple tables)
  document.querySelectorAll(`[data-soi-task]`).forEach(row => {
    if (row.getAttribute('data-soi-task') === taskName) {
      row.style.display = visible ? '' : 'none';
      // When hiding, also clear the SOI select and % input so it won't be saved
      if (!visible) {
        const key = taskName.replace(/[^a-z0-9]/gi, '_');
        const lvlEl = document.getElementById(`${prefix}-soi-lvl-${key}`);
        const pctEl = document.getElementById(`${prefix}-soi-pct-${key}`);
        if (lvlEl) lvlEl.value = '';
        if (pctEl) pctEl.value = '';
      }
    }
  });
}

// On modal open: hide SOI rows for tasks that are NOT in allowedTasks
// allowedTasks is a comma-separated string; if empty, ALL tasks are allowed (all visible)
function _initSoiVisibility(prefix, allowedTasks) {
  const allowed = (allowedTasks || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
  if (!allowed.length) return; // no restriction — all rows stay visible
  document.querySelectorAll('[data-soi-task]').forEach(row => {
    const task = row.getAttribute('data-soi-task');
    const isAllowed = allowed.includes((task || '').toLowerCase());
    row.style.display = isAllowed ? '' : 'none';
    if (!isAllowed) {
      const key = (task || '').replace(/[^a-z0-9]/gi, '_');
      const lvlEl = document.getElementById(`${prefix}-soi-lvl-${key}`);
      const pctEl = document.getElementById(`${prefix}-soi-pct-${key}`);
      if (lvlEl) lvlEl.value = '';
      if (pctEl) pctEl.value = '';
    }
  });
}

function epToggleTask(label, taskName) { _toggleTaskPill(label, taskName, 'ep-tasks'); }
function apToggleTask(label, taskName) { _toggleTaskPill(label, taskName, 'ap-tasks'); }

function buildAllowedTasksPickerHtml(tasks, selectedValue, prefix, projectId = '') {
  const selected = selectedValue ? selectedValue.split(',').map(x => x.trim().toLowerCase()).filter(Boolean) : [];
  const projectArg = JSON.stringify(projectId || '');
  return `
    <div class="form-group">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px">
        <label class="form-label" style="margin-bottom:0">Allowed Tasks
          <span style="font-size:10px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0"> — tick tasks this project uses (none ticked = all allowed)</span>
        </label>
      </div>
      <div id="${prefix}-task-quickadd" style="display:none;margin-bottom:12px;padding:12px;background:var(--surface);border:1.5px dashed var(--accent);border-radius:10px">
        <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px">New task name</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input class="form-input" id="${prefix}-new-task-name" type="text" placeholder="Type task name here" style="flex:1;min-width:180px;background:var(--surface)" onkeydown="if(event.key==='Enter'){event.preventDefault();saveProjectTaskFromModal('${prefix}', ${projectArg})}" />
          <button class="btn btn-primary btn-sm" type="button" onclick="saveProjectTaskFromModal('${prefix}', ${projectArg})">Add</button>
          <button class="btn btn-ghost btn-sm" type="button" onclick="toggleProjectTaskQuickAdd('${prefix}', ${projectArg}, false)">Cancel</button>
        </div>
      </div>
      <div id="${prefix}-task-pills" style="display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px">
        ${tasks.map(t => {
          const checked = selected.includes(t.trim().toLowerCase());
          return `<label style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1.5px solid ${checked?'var(--accent)':'var(--border)'};background:${checked?'var(--accent-soft)':'var(--surface)'};cursor:pointer;font-size:13px;font-weight:600;color:${checked?'var(--accent)':'var(--muted)'};transition:all .15s" onclick="${prefix}ToggleTask(this,'${escHtml(t)}')">
            <input type="checkbox" ${checked?'checked':''} style="display:none" />
            ${escHtml(t)}
          </label>`;
        }).join('')}
      </div>
      <input type="hidden" id="${prefix}-tasks" value="${escHtml(selectedValue || '')}"/>
    </div>
  `;
}

function getProjectModalDraft(prefix) {
  const tasks = appData?.task_categories || [];
  return {
    code: document.getElementById(`${prefix}-code`)?.value?.trim() || '',
    name: document.getElementById(`${prefix}-name`)?.value?.trim() || '',
    planned_hours: parseFloat(document.getElementById(`${prefix}-hours`)?.value) || 0,
    use_module: parseInt(document.getElementById(`${prefix}-mod`)?.value || '0'),
    allowed_tasks: document.getElementById(`${prefix}-tasks`)?.value?.trim() || '',
    soi_rows: collectSoiRows(tasks, prefix),
    module_rows: collectModuleRows(prefix)
  };
}

function toggleProjectTaskQuickAdd(prefix, projectId = '', forceState = null) {
  const box = document.getElementById(`${prefix}-task-quickadd`);
  const input = document.getElementById(`${prefix}-new-task-name`);
  if (!box) {
    console.error('Task quick-add box not found for prefix:', prefix);
    toast('Task input box not found', 'error');
    return;
  }
  const isHidden = getComputedStyle(box).display === 'none';
  const shouldOpen = typeof forceState === 'boolean' ? forceState : isHidden;
  box.style.display = shouldOpen ? 'block' : 'none';
  if (shouldOpen && input) {
    input.value = '';
    setTimeout(() => {
      input.focus();
      input.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 0);
  } else if (input) {
    input.value = '';
  }
}

async function saveProjectTaskFromModal(prefix, projectId = '') {
  const input = document.getElementById(`${prefix}-new-task-name`);
  const name = input?.value?.trim();
  if (!name) { toast('Task name is required', 'error'); input?.focus(); return; }

  const current = appData?.task_categories || [];
  if (current.some(t => t.toLowerCase() === name.toLowerCase())) {
    toast(`Task "${name}" already exists`, 'error');
    input?.focus();
    return;
  }

  const draft = getProjectModalDraft(prefix);
  const r = await api('POST', '/api/admin/task-categories', { name });
  if (!r.ok) { toast(r.data?.error || 'Failed to add task', 'error'); return; }

  const d = await api('GET', '/api/data');
  if (d.ok) appData = d.data;

  const allowed = draft.allowed_tasks ? draft.allowed_tasks.split(',').map(t => t.trim()).filter(Boolean) : [];
  if (!allowed.some(t => t.toLowerCase() === name.toLowerCase())) allowed.push(name);
  draft.allowed_tasks = allowed.join(',');

  toast(`Task "${name}" added`, 'success');

  if (prefix === 'ep' && projectId) {
    const project = (appData?.projects || []).find(p => p.id === projectId);
    if (project) {
      await openEditProjModal(project, draft);
      return;
    }
  }
  openAddProjModal(draft);
}


async function openEditProjModal(p, draft = null) {
  const tasks = appData?.task_categories || [];
  const soiData = draft?.soi_rows || ((await api('GET', `/api/admin/projects/${p.id}/soi`)).data || []);
  const modRes = await api('GET', `/api/admin/projects/${p.id}/modules`);
  const moduleData = draft?.module_rows || (modRes.ok ? (modRes.data || []) : []);
  const code = draft?.code ?? p.code;
  const name = draft?.name ?? p.name;
  const plannedHours = draft?.planned_hours != null ? draft.planned_hours : p.planned_hours;
  const useModule = draft?.use_module != null ? parseInt(draft.use_module) : (p.use_module ? 1 : 0);
  const allowedTasks = draft?.allowed_tasks != null ? draft.allowed_tasks : (p.allowed_tasks || '');
  openModal(`
    <div class="modal-title">Edit Project <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Code *</label><input class="form-input" id="ep-code" type="text" value="${escHtml(code)}" /></div>
      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="ep-name" type="text" value="${escHtml(name)}" /></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Planned Hours</label><input class="form-input" id="ep-hours" type="number" min="0" step="0.5" value="${plannedHours}" /></div>
      <div class="form-group"><label class="form-label">Use Module</label>
        <select class="form-input" id="ep-mod"><option value="1" ${useModule===1?'selected':''}>Yes</option><option value="0" ${useModule===0?'selected':''}>No</option></select></div>
    </div>
    ${buildAllowedTasksPickerHtml(tasks, allowedTasks, 'ep', p.id)}
    <div class="form-group" style="margin-top:20px">
      <label class="form-label" style="font-size:13px;font-weight:700;color:var(--accent-dark);letter-spacing:0;text-transform:none">📦 Module Planned Hours</label>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Configure planned hours per module (only used when Use Module is Yes)</div>
      ${buildModulePlanHtml(moduleData, 'ep')}
    </div>
    <div class="form-group" style="margin-top:20px">
      <label class="form-label" style="font-size:13px;font-weight:700;color:var(--accent-dark);letter-spacing:0;text-transform:none">🎯 SOI Level Plan</label>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Assign each task category to an SOI level (SOI-1 to SOI-4) and its planned % contribution</div>
      ${buildSoiPlanHtml(tasks, soiData, 'ep')}
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditProject('${p.id}')">Update</button>
    </div>
  `);
  _initSoiVisibility('ep', allowedTasks);
}

async function saveEditProject(id) {
  const code = document.getElementById('ep-code').value.trim();
  const name = document.getElementById('ep-name').value.trim();
  const planned_hours = parseFloat(document.getElementById('ep-hours').value) || 0;
  const use_module = parseInt(document.getElementById('ep-mod').value);
  const allowed_tasks = document.getElementById('ep-tasks').value.trim();
  if (!code || !name) { toast('Code and name are required', 'error'); return; }
  const r = await api('PUT', `/api/admin/projects/${id}`, { code, name, planned_hours, use_module, allowed_tasks });
  if (!r.ok) { toast(r.data.error || 'Failed', 'error'); return; }
  // Save SOI plan
  const tasks = appData?.task_categories || [];
  const soiRows = collectSoiRows(tasks, 'ep');
  await api('POST', `/api/admin/projects/${id}/soi`, { rows: soiRows });
  // Save module planned hours
  const moduleRows = collectModuleRows('ep');
  await api('POST', `/api/admin/projects/${id}/modules`, { modules: moduleRows });
  toast('Project updated', 'success');
  closeModal();
  const d = await api('GET', '/api/data'); if (d.ok) appData = d.data;
  renderProjects();
}

async function deleteProject(id, name) {
  if (!confirm(`Delete project "${name}" and ALL sessions? This cannot be undone.`)) return;
  const r = await api('DELETE', `/api/admin/projects/${id}`);
  if (!r.ok) { toast(r.data.error || 'Failed', 'error'); return; }
  toast('Project deleted', 'success');
  const data = await api('GET', '/api/data');
  if (data.ok) appData = data.data;
  renderProjects();
}

async function sendManualReport() {
  const date = document.getElementById('email-date')?.value || '';

// ── Excel Import ──────────────────────────────────────────────────────────────
let _importFile = null;

function handleImportDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('drop-zone');
  dz.style.borderColor = '#cbd5e1'; dz.style.background = '#f8fafc';
  const file = e.dataTransfer.files[0];
  if (file) handleImportFile(file);
}

function handleImportFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.xlsx')) {
    toast('Only .xlsx files are supported', 'error'); return;
  }
  _importFile = file;
  const el = document.getElementById('import-file-name');
  if (el) el.innerHTML = '<span style="color:#16a34a;font-weight:600">✅ ' + escHtml(file.name) + '</span>  (' + (file.size/1024).toFixed(1) + ' KB)';
  const dz = document.getElementById('drop-zone');
  if (dz) { dz.style.borderColor = '#16a34a'; dz.style.background = '#f0fdf4'; }
  const btn = document.getElementById('import-run-btn');
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
}

async function runImport() {
  if (!_importFile) { toast('Please select a file first', 'error'); return; }
  const btn = document.getElementById('import-run-btn');
  const res = document.getElementById('import-results');
  btn.disabled = true; btn.textContent = '⏳ Importing…';
  if (res) res.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">Processing your file…</div>';

  const fd = new FormData();
  fd.append('file', _importFile);
  try {
    const r = await fetch('/api/admin/import-sessions', {
      method: 'POST', credentials: 'same-origin', body: fd
    });
    const data = await r.json();
    btn.disabled = false; btn.textContent = '🚀 Import Now';

    if (!r.ok || !data.ok) {
      if (res) res.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px;color:#dc2626;font-weight:600">❌ ' + escHtml(data.error || 'Import failed') + '</div>';
      return;
    }

    // Summary banner
    const total = data.total_processed;
    const imp   = data.imported;
    const skip  = data.skipped;
    const err   = data.errors;
    let summaryHtml = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'
      + '<div style="flex:1;min-width:100px;background:var(--surface2);border:1px solid #86efac;border-radius:10px;padding:14px;text-align:center">'
      +   '<div style="font-size:28px;font-weight:900;color:#16a34a">' + imp + '</div>'
      +   '<div style="font-size:11px;color:#166534;font-weight:600">IMPORTED</div></div>'
      + '<div style="flex:1;min-width:100px;background:#fefce8;border:1px solid #fde047;border-radius:10px;padding:14px;text-align:center">'
      +   '<div style="font-size:28px;font-weight:900;color:#d97706">' + skip + '</div>'
      +   '<div style="font-size:11px;color:#92400e;font-weight:600">SKIPPED</div></div>'
      + '<div style="flex:1;min-width:100px;background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:14px;text-align:center">'
      +   '<div style="font-size:28px;font-weight:900;color:#dc2626">' + err + '</div>'
      +   '<div style="font-size:11px;color:#991b1b;font-weight:600">ERRORS</div></div>'
      + '<div style="flex:1;min-width:100px;background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:14px;text-align:center">'
      +   '<div style="font-size:28px;font-weight:900;color:#2563eb">' + total + '</div>'
      +   '<div style="font-size:11px;color:#1e40af;font-weight:600">TOTAL ROWS</div></div>'
      + '</div>';

    // Detail table
    if (data.results && data.results.length > 0) {
      summaryHtml += '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">'
        + '<table style="width:100%;border-collapse:collapse">'
        + '<thead><tr style="background:var(--surface2)">'
        + '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Row</th>'
        + '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Employee</th>'
        + '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Project</th>'
        + '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Status</th>'
        + '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Detail</th>'
        + '</tr></thead><tbody>'
        + data.results.map(r => {
            const sc = r.status==='imported' ? '#16a34a' : r.status==='skipped' ? '#d97706' : '#dc2626';
            const bg = r.status==='imported' ? '#f0fdf4' : r.status==='skipped' ? '#fffbeb' : '#fef2f2';
            const ic = r.status==='imported' ? '✅' : r.status==='skipped' ? '⏭' : '❌';
            return '<tr style="border-top:1px solid var(--border);background:'+bg+'">'
              + '<td style="padding:8px 12px;font-size:12px;font-family:monospace;color:var(--muted)">' + r.row + '</td>'
              + '<td style="padding:8px 12px;font-size:12px;font-weight:600;color:var(--text)">' + escHtml(r.employee||'—') + '</td>'
              + '<td style="padding:8px 12px;font-size:12px;color:var(--muted)">' + escHtml(r.project||'—') + '</td>'
              + '<td style="padding:8px 12px"><span style="background:'+sc+'18;color:'+sc+';border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">'+ ic +' '+ r.status.toUpperCase() +'</span></td>'
              + '<td style="padding:8px 12px;font-size:12px;color:var(--muted)">' + escHtml(r.detail||'') + '</td>'
              + '</tr>';
          }).join('')
        + '</tbody></table></div>';
    }

    if (res) res.innerHTML = summaryHtml;
    if (imp > 0) {
      toast(imp + ' session' + (imp>1?'s':'') + ' imported successfully!', 'success');
      // Refresh app data
      const rd = await api('GET', '/api/data'); if (rd.ok) appData = rd.data;
    }
  } catch (e) {
    btn.disabled = false; btn.textContent = '🚀 Import Now';
    if (res) res.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px;color:#dc2626">Network error: ' + escHtml(String(e)) + '</div>';
  }
}


// ── Dark / Light Mode ─────────────────────────────────────────────────────────
// ── Per-user theme (keyed by user ID so each user has their own preference) ──
function _themeKey() {
  // Use emp_id for employees, role for admin — ensures isolation per account
  const uid = STATE.emp_id || STATE.role || 'default';
  return 'pulse-theme:' + uid;
}

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  const chk   = document.getElementById('theme-checkbox');
  if (icon)  icon.textContent  = dark ? '☀️' : '🌙';
  if (label) label.textContent = dark ? 'Light' : 'Dark';
  if (chk)   chk.checked       = dark;
  // Settings page sync
  const si = document.getElementById('theme-icon-s');
  const sl = document.getElementById('theme-label-s');
  if (si) si.textContent  = dark ? '☀️' : '🌙';
  if (sl) sl.textContent  = dark ? 'Light Mode' : 'Dark Mode';
  try { localStorage.setItem(_themeKey(), dark ? 'dark' : 'light'); } catch(e) {}
}

function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDark);
}

function loadUserTheme() {
  // Called after login so STATE.emp_id / STATE.role is set
  try {
    const saved = localStorage.getItem(_themeKey());
    applyTheme(saved === 'dark');
  } catch(e) { applyTheme(false); }
}

// On page load: apply a neutral default (no flash) until user is identified
(function() {
  // Remove any stray global key set by old code
  try { localStorage.removeItem('pulse-theme'); } catch(e) {}
})();

    + '<button class="btn btn-primary" onclick="saveAdminPassword()">🔒 Update Password</button>'

}

async function saveAdminPassword() {
  const oldPw  = document.getElementById('as-old-pw').value;
  const newPw  = document.getElementById('as-new-pw').value;
  const confPw = document.getElementById('as-confirm-pw').value;
  const msgEl  = document.getElementById('as-msg');
  if (!oldPw || !newPw || !confPw) {
    msgEl.innerHTML = '<span style="color:var(--red)">All fields are required</span>'; return;
  }
  if (newPw.length < 6) {
    msgEl.innerHTML = '<span style="color:var(--red)">Password must be at least 6 characters</span>'; return;
  }
  if (newPw !== confPw) {
    msgEl.innerHTML = '<span style="color:var(--red)">Passwords do not match</span>'; return;
  }
  msgEl.innerHTML = '<span style="color:var(--muted)">Saving…</span>';
  const r = await api('POST', '/api/password/change', { old_password: oldPw, new_password: newPw });
  if (!r.ok) {
    msgEl.innerHTML = '<span style="color:var(--red)">❌ ' + escHtml(r.data.error || 'Failed') + '</span>'; return;
  }
  msgEl.innerHTML = '<span style="color:var(--green)">✅ Password updated successfully!</span>';
  setTimeout(closeModal, 1500);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ─────────────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────────────
function secondsToHHMMSS(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}
function secondsToHHMM(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function parseDurationToSec(dur) {
  if (!dur) return 0;
  const parts = dur.split(':').map(Number);
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*3600 + parts[1]*60;
  
  return 0;
}
function getMondayDate() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0,10);
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showErr(msg) {
  document.getElementById('page-content').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">${msg}</div></div>`;
}

    STATE.name = r.data.name;
    STATE.emp_id = r.data.emp_id;
